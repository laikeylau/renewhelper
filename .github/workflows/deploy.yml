name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject secrets into wrangler.toml
        shell: bash
        env:
          CF_KV_ID: ${{ secrets.CF_KV_ID }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          CF_DOMAIN_API_KEY: ${{ secrets.CF_DOMAIN_API_KEY }}
          CF_DOMAIN_EMAIL: ${{ secrets.CF_DOMAIN_EMAIL }}
          CF_DOMAIN_API_TYPE: ${{ secrets.CF_DOMAIN_API_TYPE }}
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_API_SECRET: ${{ secrets.PORKBUN_API_SECRET }}
          DNSHE_API_KEY: ${{ secrets.DNSHE_API_KEY }}
          DNSHE_API_SECRET: ${{ secrets.DNSHE_API_SECRET }}
          DIGITALPLAT_API_KEY: ${{ secrets.DIGITALPLAT_API_KEY }}
          DIGITALPLAT_API_SECRET: ${{ secrets.DIGITALPLAT_API_SECRET }}
        run: |
          if [ -z "$CF_KV_ID" ]; then
            echo "CF_KV_ID secret is required"
            exit 1
          fi

          if [ -z "$AUTH_PASSWORD" ]; then
            echo "AUTH_PASSWORD secret is required"
            exit 1
          fi

          sed -i "s|id = \".*\"|id = \"$CF_KV_ID\"|" wrangler.toml
          sed -i "s|preview_id = \".*\"|preview_id = \"$CF_KV_ID\"|" wrangler.toml
          sed -i "s|AUTH_PASSWORD = \".*\"|AUTH_PASSWORD = \"$AUTH_PASSWORD\"|" wrangler.toml

          if [ -n "$CF_DOMAIN_API_KEY" ]; then
            echo "CF_DOMAIN_API_KEY = \"$CF_DOMAIN_API_KEY\"" >> wrangler.toml
            echo "CF_DOMAIN_EMAIL = \"$CF_DOMAIN_EMAIL\"" >> wrangler.toml
            echo "CF_DOMAIN_API_TYPE = \"${CF_DOMAIN_API_TYPE:-global}\"" >> wrangler.toml
          fi

          if [ -n "$PORKBUN_API_KEY" ]; then
            echo "PORKBUN_API_KEY = \"$PORKBUN_API_KEY\"" >> wrangler.toml
            echo "PORKBUN_API_SECRET = \"$PORKBUN_API_SECRET\"" >> wrangler.toml
          fi

          if [ -n "$DNSHE_API_KEY" ]; then
            echo "DNSHE_API_KEY = \"$DNSHE_API_KEY\"" >> wrangler.toml
            echo "DNSHE_API_SECRET = \"$DNSHE_API_SECRET\"" >> wrangler.toml
          fi

          if [ -n "$DIGITALPLAT_API_KEY" ]; then
            echo "DIGITALPLAT_API_KEY = \"$DIGITALPLAT_API_KEY\"" >> wrangler.toml
            echo "DIGITALPLAT_API_SECRET = \"$DIGITALPLAT_API_SECRET\"" >> wrangler.toml
          fi

      - name: Build project
        run: npm run build

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          command: deploy
