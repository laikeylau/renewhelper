name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into wrangler.toml
        run: |
          # 替换 KV ID
          sed -i "s|id = \"\"|id = \"${{ secrets.CF_KV_ID }}\"|g" wrangler.toml
          
          # 替换 AUTH_PASSWORD
          sed -i "s|AUTH_PASSWORD = \"admin\"|AUTH_PASSWORD = \"${{ secrets.AUTH_PASSWORD }}\"|g" wrangler.toml
          
          # 域名 API (可选) - 只在配置了才添加
          if [ -n "${{ secrets.CF_DOMAIN_API_KEY }}" ] && [ "${{ secrets.CF_DOMAIN_API_KEY }}" != "" ]; then
            echo "CF_DOMAIN_API_KEY = \"${{ secrets.CF_DOMAIN_API_KEY }}\"" >> wrangler.toml
            echo "CF_DOMAIN_EMAIL = \"${{ secrets.CF_DOMAIN_EMAIL }}\"" >> wrangler.toml
            CF_DOMAIN_API_TYPE=${{ secrets.CF_DOMAIN_API_TYPE }}
            CF_DOMAIN_API_TYPE=${CF_DOMAIN_API_TYPE:-global}
            echo "CF_DOMAIN_API_TYPE = \"$CF_DOMAIN_API_TYPE\"" >> wrangler.toml
          fi
          
          if [ -n "${{ secrets.PORKBUN_API_KEY }}" ] && [ "${{ secrets.PORKBUN_API_KEY }}" != "" ]; then
            echo "PORKBUN_API_KEY = \"${{ secrets.PORKBUN_API_KEY }}\"" >> wrangler.toml
            echo "PORKBUN_API_SECRET = \"${{ secrets.PORKBUN_API_SECRET }}\"" >> wrangler.toml
          fi
          
          if [ -n "${{ secrets.DNSHE_API_KEY }}" ] && [ "${{ secrets.DNSHE_API_KEY }}" != "" ]; then
            echo "DNSHE_API_KEY = \"${{ secrets.DNSHE_API_KEY }}\"" >> wrangler.toml
            echo "DNSHE_API_SECRET = \"${{ secrets.DNSHE_API_SECRET }}\"" >> wrangler.toml
          fi
          
          if [ -n "${{ secrets.DIGITALPLAT_API_KEY }}" ] && [ "${{ secrets.DIGITALPLAT_API_KEY }}" != "" ]; then
            echo "DIGITALPLAT_API_KEY = \"${{ secrets.DIGITALPLAT_API_KEY }}\"" >> wrangler.toml
            echo "DIGITALPLAT_API_SECRET = \"${{ secrets.DIGITALPLAT_API_SECRET }}\"" >> wrangler.toml
          fi

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
