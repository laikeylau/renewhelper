name = "renewhelper"
main = "_worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "renewhelper"

[env.staging]
name = "renewhelper-staging"

# 绑定 KV 数据库
[[kv_namespaces]]
binding = "RENEW_KV"
id = "db359350c2f747f1bf1bad64857cbf08"
preview_id = "db359350c2f747f1bf1bad64857cbf08"

# 定时任务
[triggers]
crons = ["0,30 * * * *"]

# 环境变量
[vars]
AUTH_PASSWORD = "admin"

# 域名 API 配置 (可选)
# CF_DOMAIN_API_KEY = ""
# CF_DOMAIN_EMAIL = ""
# CF_DOMAIN_API_TYPE = "global"
# PORKBUN_API_KEY = ""
# PORKBUN_API_SECRET = ""
# DNSHE_API_KEY = ""
# DNSHE_API_SECRET = ""
# DIGITALPLAT_API_KEY = ""
# DIGITALPLAT_API_SECRET = ""
